name: vm-migrator

services:
  db:
    image: mariadb:10.11.8
    container_name: vmigrate-db
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${DB_NAME:-vm_migrator}
      MARIADB_USER: ${DB_USER:-vm_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-admin}
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      control-plane:
        aliases:
          - database
          - vmigrate-db
    ports:
      - "${DB_PUBLISHED_PORT:-13306}:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7.2.5-alpine
    container_name: vmigrate-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      control-plane:
        aliases:
          - vmigrate-redis
    ports:
      - "${REDIS_PUBLISHED_PORT:-16379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: docker/dockerfiles/backend.Dockerfile
    image: ${VM_MIGRATOR_BACKEND_IMAGE:-vm-migrator/backend}:${VM_MIGRATOR_VERSION:-local}
    container_name: vmigrate-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://vm_user:admin@db:3306/vm_migrator?charset=utf8mb4}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MIGRATION_OUTPUT_DIR: /var/lib/vm-migrator/images
      LOG_DIR: /app/logs
      NFS_ENABLED: "false"
      ENABLE_REAL_CONVERSION: "false"
      ENABLE_ANSIBLE_CONVERSION: "false"
      ENABLE_TERRAFORM_FROM_CELERY: "false"
    volumes:
      - backend-static:/app/staticfiles
      - backend-logs:/app/logs
    networks:
      control-plane:
        aliases:
          - vmigrate-backend
    ports:
      - "${BACKEND_PUBLISHED_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/backend-healthcheck"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 40s

  worker:
    build:
      context: .
      dockerfile: docker/dockerfiles/conversion-worker.Dockerfile
      args:
        TERRAFORM_VERSION: ${TERRAFORM_VERSION:-1.7.5}
    image: ${VM_MIGRATOR_CONVERSION_WORKER_IMAGE:-vm-migrator/conversion-worker}:${VM_MIGRATOR_VERSION:-local}
    container_name: vmigrate-worker
    user: root
    command: ["celery", "-A", "core", "worker", "-l", "INFO", "-Q", "migrations,discovery,provisioning,celery", "--hostname", "worker@%h"]
    entrypoint: ["/usr/local/bin/conversion-worker-entrypoint"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://vm_user:admin@db:3306/vm_migrator?charset=utf8mb4}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MIGRATION_OUTPUT_DIR: /var/lib/vm-migrator/images
      ARTIFACT_BACKUP_DIR: /var/lib/vm-migrator/images/backups
      LOG_DIR: /app/logs
      ENABLE_REAL_CONVERSION: "true"
      ENABLE_ANSIBLE_CONVERSION: "true"
      ENABLE_TERRAFORM_FROM_CELERY: "true"
      LIBGUESTFS_BACKEND: ${LIBGUESTFS_BACKEND:-direct}
      LIBGUESTFS_MEMSIZE: ${LIBGUESTFS_MEMSIZE:-2048}
      VMWARE_ESXI_CONVERSION_TRANSPORT: ${VMWARE_ESXI_CONVERSION_TRANSPORT:-vddk}
      VMWARE_VDDK_LIBDIR: ${VMWARE_VDDK_LIBDIR:-/opt/vmware-vddk}
      VMWARE_VDDK_NBDKIT_PLUGIN_PATH: ${VMWARE_VDDK_NBDKIT_PLUGIN_PATH:-/usr/lib/x86_64-linux-gnu/nbdkit/plugins}
      VMWARE_NBDKIT_FILTER_PATH: ${VMWARE_NBDKIT_FILTER_PATH:-/usr/lib/x86_64-linux-gnu/nbdkit/filters}
      TERRAFORM_PLUGIN_CACHE_DIR: /opt/terraform/plugin-cache
      TF_PLUGIN_CACHE_DIR: /opt/terraform/plugin-cache
    volumes:
      - worker-images:/var/lib/vm-migrator/images
      - backend-logs:/app/logs
      - worker-guestfs-cache:/var/cache/guestfs
      - worker-terraform-cache:/opt/terraform/plugin-cache
      - /boot:/boot:ro
      - /lib/modules:/lib/modules:ro
      - /opt/vmware-vddk:/opt/vmware-vddk:ro
      - /usr/lib/x86_64-linux-gnu/nbdkit/plugins:/usr/lib/x86_64-linux-gnu/nbdkit/plugins:ro
    networks:
      - control-plane
    extra_hosts:
      - "vmware.local:192.168.72.242"
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "core", "inspect", "active"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  beat:
    image: ${VM_MIGRATOR_BACKEND_IMAGE:-vm-migrator/backend}:${VM_MIGRATOR_VERSION:-local}
    container_name: vmigrate-beat
    command: ["/usr/local/bin/celery-beat-entrypoint"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://vm_user:admin@db:3306/vm_migrator?charset=utf8mb4}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOG_DIR: /app/logs
      ENABLE_REAL_CONVERSION: "false"
      ENABLE_ANSIBLE_CONVERSION: "false"
      ENABLE_TERRAFORM_FROM_CELERY: "false"
    volumes:
      - beat-state:/var/lib/vm-migrator/beat
      - backend-logs:/app/logs
    networks:
      - control-plane
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/lib/vm-migrator/beat/celerybeat-schedule || pgrep -f 'celery.*beat' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 6
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: docker/dockerfiles/frontend.Dockerfile
    image: ${VM_MIGRATOR_FRONTEND_IMAGE:-vm-migrator/frontend}:${VM_MIGRATOR_VERSION:-local}
    container_name: vmigrate-frontend
    networks:
      - control-plane
    ports:
      - "${FRONTEND_PUBLISHED_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

networks:
  control-plane:
    name: vm-migrator-control
    driver: bridge

volumes:
  mariadb-data:
  redis-data:
  backend-static:
  backend-logs:
  beat-state:
  worker-images:
  worker-guestfs-cache:
  worker-terraform-cache:
